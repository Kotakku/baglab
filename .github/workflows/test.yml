name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            os_version: jammy
          - ros_distro: jazzy
            os_version: noble
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base-${{ matrix.os_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install baglab and run tests
        run: |
          uv sync --extra dev
          uv run pytest

      - name: Install C++ build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            ros-${{ matrix.ros_distro }}-rosbag2-cpp \
            ros-${{ matrix.ros_distro }}-rosbag2-storage \
            ros-${{ matrix.ros_distro }}-rcpputils \
            ros-${{ matrix.ros_distro }}-rmw \
            ros-${{ matrix.ros_distro }}-rcutils \
            ros-${{ matrix.ros_distro }}-rosidl-runtime-c \
            ros-${{ matrix.ros_distro }}-rosidl-runtime-cpp \
            ros-${{ matrix.ros_distro }}-rosidl-typesupport-introspection-cpp \
            ros-${{ matrix.ros_distro }}-rosidl-typesupport-cpp \
            ros-${{ matrix.ros_distro }}-sensor-msgs \
            ros-${{ matrix.ros_distro }}-geometry-msgs

      - name: Build and install baglab_cpp_backend
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          uv pip install scikit-build-core pybind11 numpy
          uv pip install --no-build-isolation ./baglab_cpp_backend

      - name: Run tests with C++ backend
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          uv run python -c "import baglab; assert baglab.has_cpp_backend(), 'C++ backend not detected'"
          uv run pytest
