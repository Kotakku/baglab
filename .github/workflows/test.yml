name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            os_version: jammy
          - ros_distro: jazzy
            os_version: noble
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base-${{ matrix.os_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install baglab and run tests
        run: |
          uv sync --extra dev
          uv run pytest

      - name: Install C++ build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            liblz4-dev \
            libzstd-dev \
            pkg-config \
            cmake

      - name: Build and install baglab_mcap_backend
        run: |
          uv sync --extra dev --extra mcap
          uv run python -c "import baglab; assert baglab.has_mcap_backend(), 'MCAP backend not detected'"

      - name: Run tests with MCAP backend
        run: |
          uv run pytest
