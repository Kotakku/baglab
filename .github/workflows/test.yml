name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            os_version: jammy
          - ros_distro: jazzy
            os_version: noble
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base-${{ matrix.os_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest
